<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: white; display: inline-block; }
  svg { display: block; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" style="background:white; font-family: 'Helvetica Neue', Arial, sans-serif;">

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2980B9"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27AE60"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E67E22"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8E44AD"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2C3E50">Request Lifecycle: "Show me CPU metrics"</text>

  <!-- Swimlane headers -->
  <!-- User -->
  <rect x="10" y="50" width="160" height="50" rx="8" fill="#3498DB"/>
  <text x="90" y="80" text-anchor="middle" fill="white" font-size="13" font-weight="bold">👤 User</text>

  <!-- LLM -->
  <rect x="190" y="50" width="160" height="50" rx="8" fill="#8E44AD"/>
  <text x="270" y="80" text-anchor="middle" fill="white" font-size="13" font-weight="bold">🤖 LLM</text>

  <!-- MCP Server -->
  <rect x="370" y="50" width="200" height="50" rx="8" fill="#27AE60"/>
  <text x="470" y="72" text-anchor="middle" fill="white" font-size="12" font-weight="bold">⚙️ MCP Server</text>
  <text x="470" y="90" text-anchor="middle" fill="white" font-size="10">grafana-mcp-app</text>

  <!-- Grafana -->
  <rect x="590" y="50" width="200" height="50" rx="8" fill="#E67E22"/>
  <text x="690" y="80" text-anchor="middle" fill="white" font-size="13" font-weight="bold">📈 Grafana API</text>

  <!-- MCP App UI -->
  <rect x="810" y="50" width="200" height="50" rx="8" fill="#2980B9"/>
  <text x="910" y="72" text-anchor="middle" fill="white" font-size="12" font-weight="bold">📊 MCP App UI</text>
  <text x="910" y="90" text-anchor="middle" fill="white" font-size="10">sandboxed iframe</text>

  <!-- iframe / Grafana Embed -->
  <rect x="1030" y="50" width="160" height="50" rx="8" fill="#E74C3C"/>
  <text x="1110" y="72" text-anchor="middle" fill="white" font-size="12" font-weight="bold">🖼️ Grafana</text>
  <text x="1110" y="90" text-anchor="middle" fill="white" font-size="10">iframe /d-solo/:uid</text>

  <!-- Swimlane vertical lines -->
  <line x1="90" y1="100" x2="90" y2="440" stroke="#BDC3C7" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="270" y1="100" x2="270" y2="440" stroke="#BDC3C7" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="470" y1="100" x2="470" y2="440" stroke="#BDC3C7" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="690" y1="100" x2="690" y2="440" stroke="#BDC3C7" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="910" y1="100" x2="910" y2="440" stroke="#BDC3C7" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="1110" y1="100" x2="1110" y2="440" stroke="#BDC3C7" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 1: User types query -->
  <rect x="30" y="115" width="120" height="40" rx="6" fill="#EBF5FB" stroke="#3498DB" stroke-width="1.5"/>
  <text x="90" y="130" text-anchor="middle" fill="#1A5276" font-size="10" font-weight="bold">1. Types query:</text>
  <text x="90" y="146" text-anchor="middle" fill="#1A5276" font-size="10">"show me CPU"</text>

  <!-- Arrow 1: User to LLM -->
  <line x1="150" y1="135" x2="210" y2="135" stroke="#3498DB" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="180" y="127" text-anchor="middle" fill="#2471A3" font-size="9">natural language</text>

  <!-- Step 2: LLM decides to call show_panel -->
  <rect x="195" y="115" width="145" height="40" rx="6" fill="#F5EEF8" stroke="#8E44AD" stroke-width="1.5"/>
  <text x="270" y="130" text-anchor="middle" fill="#6C3483" font-size="10" font-weight="bold">2. Calls tool:</text>
  <text x="270" y="146" text-anchor="middle" fill="#6C3483" font-size="10">show_panel(uid, panelId)</text>

  <!-- Arrow 2: LLM to MCP Server -->
  <line x1="340" y1="135" x2="400" y2="135" stroke="#8E44AD" stroke-width="2" marker-end="url(#arr-purple)"/>
  <text x="370" y="127" text-anchor="middle" fill="#8E44AD" font-size="9">MCP call</text>

  <!-- Step 3: Server fetches dashboard JSON -->
  <rect x="380" y="175" width="175" height="40" rx="6" fill="#EAFAF1" stroke="#27AE60" stroke-width="1.5"/>
  <text x="467" y="190" text-anchor="middle" fill="#1E8449" font-size="10" font-weight="bold">3. Fetches dashboard</text>
  <text x="467" y="206" text-anchor="middle" fill="#1E8449" font-size="10">GET /api/dashboards/uid/:uid</text>

  <!-- Arrow 3: MCP Server to Grafana -->
  <line x1="555" y1="195" x2="625" y2="195" stroke="#27AE60" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="590" y="187" text-anchor="middle" fill="#239B56" font-size="9">HTTP GET</text>

  <!-- Grafana responds with dashboard JSON -->
  <rect x="625" y="175" width="130" height="40" rx="6" fill="#FEF9E7" stroke="#E67E22" stroke-width="1.5"/>
  <text x="690" y="190" text-anchor="middle" fill="#784212" font-size="10" font-weight="bold">Dashboard JSON</text>
  <text x="690" y="206" text-anchor="middle" fill="#784212" font-size="10">panel metadata</text>

  <!-- Arrow 3b: Grafana back to MCP Server -->
  <path d="M 625 205 L 560 205 L 560 175 L 555 175" stroke="#E67E22" stroke-width="1.5" fill="none" marker-end="url(#arr-orange)" stroke-dasharray="4,3"/>
  <text x="595" y="220" text-anchor="middle" fill="#E67E22" font-size="9">panel list</text>

  <!-- Step 4: Server builds embed URL + returns UI resource -->
  <rect x="380" y="255" width="175" height="50" rx="6" fill="#EAFAF1" stroke="#27AE60" stroke-width="1.5"/>
  <text x="467" y="273" text-anchor="middle" fill="#1E8449" font-size="10" font-weight="bold">4. Builds response:</text>
  <text x="467" y="289" text-anchor="middle" fill="#1E8449" font-size="10">embed URL + HTML bundle</text>
  <text x="467" y="303" text-anchor="middle" fill="#1E8449" font-size="9">ui://panel-view resource</text>

  <!-- Arrow 4: MCP Server to LLM (returns) -->
  <path d="M 380 275 L 340 275 L 340 165 L 340 160" stroke="#8E44AD" stroke-width="2" fill="none" marker-end="url(#arr-purple)" stroke-dasharray="4,3"/>
  <text x="358" y="220" text-anchor="start" fill="#6C3483" font-size="9">tool result +</text>
  <text x="358" y="232" text-anchor="start" fill="#6C3483" font-size="9">ui://panel-view</text>

  <!-- Step 5: LLM renders HTML bundle -->
  <rect x="195" y="330" width="145" height="40" rx="6" fill="#F5EEF8" stroke="#8E44AD" stroke-width="1.5"/>
  <text x="270" y="345" text-anchor="middle" fill="#6C3483" font-size="10" font-weight="bold">5. Renders HTML</text>
  <text x="270" y="361" text-anchor="middle" fill="#6C3483" font-size="10">bundle in chat UI</text>

  <!-- Arrow 5: LLM to MCP App UI -->
  <line x1="340" y1="350" x2="860" y2="350" stroke="#2980B9" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="600" y="342" text-anchor="middle" fill="#2471A3" font-size="9">renders sandboxed HTML iframe</text>

  <!-- Step 6: MCP App UI loads panel via iframe -->
  <rect x="840" y="330" width="145" height="40" rx="6" fill="#D6EAF8" stroke="#2980B9" stroke-width="1.5"/>
  <text x="912" y="345" text-anchor="middle" fill="#1A5276" font-size="10" font-weight="bold">6. Loads panel</text>
  <text x="912" y="361" text-anchor="middle" fill="#1A5276" font-size="10">iframe /d-solo/:uid</text>

  <!-- Arrow 6: MCP App UI to Grafana iframe -->
  <line x1="985" y1="350" x2="1060" y2="350" stroke="#E74C3C" stroke-width="2" marker-end="url(#arr)"/>
  <text x="1022" y="342" text-anchor="middle" fill="#C0392B" font-size="9">HTTP iframe</text>

  <!-- Step 7: Live interactive chart -->
  <rect x="1060" y="330" width="130" height="40" rx="6" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1.5"/>
  <text x="1125" y="345" text-anchor="middle" fill="#78281F" font-size="10" font-weight="bold">7. Live Chart!</text>
  <text x="1125" y="361" text-anchor="middle" fill="#78281F" font-size="10">interactive, real-time</text>

  <!-- Step numbers as circles on left -->
  <circle cx="35" cy="135" r="0" fill="none"/>

  <!-- Bottom note -->
  <rect x="200" y="400" width="800" height="40" rx="8" fill="#F8F9FA" stroke="#BDC3C7" stroke-width="1"/>
  <text x="600" y="418" text-anchor="middle" fill="#7F8C8D" font-size="11">✨ The panel renders live inside the chat — users can interact, adjust time ranges, and see real-time data without leaving the AI conversation</text>
  <text x="600" y="434" text-anchor="middle" fill="#7F8C8D" font-size="10">No screenshots. No copy-paste. Full Grafana power, embedded in Claude/ChatGPT.</text>

</svg>
</body>
</html>
