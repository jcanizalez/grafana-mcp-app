<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grafana Dashboards</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111217;
      color: #d9d9d9;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: #181b1f;
      border-bottom: 1px solid #2c3235;
      flex-shrink: 0;
    }

    #header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #e0852a;
      flex: 1;
    }

    #search-input {
      background: #22262b;
      border: 1px solid #2c3235;
      border-radius: 4px;
      color: #d9d9d9;
      font-size: 12px;
      padding: 5px 10px;
      width: 200px;
      outline: none;
    }

    #search-input::placeholder { color: #6c757d; }
    #search-input:focus { border-color: #3b6dc5; }

    #count { font-size: 12px; color: #6c757d; }

    #dashboard-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
      align-content: start;
    }

    #dashboard-list::-webkit-scrollbar { width: 6px; }
    #dashboard-list::-webkit-scrollbar-track { background: transparent; }
    #dashboard-list::-webkit-scrollbar-thumb { background: #2c3235; border-radius: 3px; }

    .dashboard-card {
      background: #181b1f;
      border: 1px solid #2c3235;
      border-radius: 6px;
      padding: 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .dashboard-card:hover {
      border-color: #3b6dc5;
      background: #1d2126;
    }

    .card-icon { font-size: 20px; }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #e0e0e0;
      line-height: 1.3;
    }

    .card-folder {
      font-size: 11px;
      color: #6c757d;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }

    .tag {
      background: #22262b;
      border-radius: 3px;
      font-size: 10px;
      padding: 2px 6px;
      color: #9fa7b3;
    }

    .card-action {
      margin-top: 4px;
      font-size: 11px;
      color: #3b6dc5;
    }

    #empty-state {
      display: none;
      flex: 1;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      color: #6c757d;
      font-size: 13px;
    }

    #empty-state.visible { display: flex; }

    #loading-state {
      display: flex;
      flex: 1;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid #2c3235;
      border-top-color: #e0852a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-state p { font-size: 13px; color: #9fa7b3; }
  </style>
</head>
<body>
  <div id="header">
    <h1>📊 Grafana Dashboards</h1>
    <input id="search-input" type="text" placeholder="Filter dashboards..." />
    <span id="count"></span>
  </div>

  <div id="loading-state">
    <div class="spinner"></div>
    <p>Loading dashboards...</p>
  </div>

  <div id="dashboard-list" style="display:none"></div>
  <div id="empty-state"><span>🔍</span> No dashboards found</div>

  <script type="module">
    import { App } from "https://esm.sh/@modelcontextprotocol/ext-apps@1.1.2/app-with-deps";

    let dashboards = [];
    let app;

    try {
      app = new App();
      await app.connect();
    } catch (e) {
      console.error("Failed to connect:", e);
    }

    if (app) {
      app.ontoolresult = (result) => {
        try {
          const data = typeof result.content === "string"
            ? JSON.parse(result.content)
            : result.content;

          dashboards = data?.dashboards ?? data ?? [];
          renderList(dashboards);
        } catch (e) {
          console.error("Failed to parse tool result:", e);
        }
      };
    }

    function getIcon(tags) {
      if (tags.includes("kubernetes") || tags.includes("k8s")) return "☸️";
      if (tags.includes("node") || tags.includes("host")) return "🖥️";
      if (tags.includes("database") || tags.includes("postgres")) return "🗄️";
      if (tags.includes("network")) return "🌐";
      if (tags.includes("application") || tags.includes("service")) return "⚙️";
      return "📊";
    }

    function renderList(items) {
      const listEl = document.getElementById("dashboard-list");
      const loadingEl = document.getElementById("loading-state");
      const emptyEl = document.getElementById("empty-state");
      const countEl = document.getElementById("count");

      loadingEl.style.display = "none";

      if (items.length === 0) {
        listEl.style.display = "none";
        emptyEl.classList.add("visible");
        countEl.textContent = "0 dashboards";
        return;
      }

      emptyEl.classList.remove("visible");
      listEl.style.display = "grid";
      countEl.textContent = `${items.length} dashboard${items.length !== 1 ? "s" : ""}`;

      listEl.innerHTML = items.map((d) => `
        <div class="dashboard-card" data-uid="${d.uid}" data-title="${encodeURIComponent(d.title)}">
          <div class="card-icon">${getIcon(d.tags || [])}</div>
          <div class="card-title">${escapeHtml(d.title)}</div>
          ${d.folderTitle ? `<div class="card-folder">📁 ${escapeHtml(d.folderTitle)}</div>` : ""}
          ${(d.tags || []).length > 0 ? `
            <div class="card-tags">
              ${d.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join("")}
            </div>
          ` : ""}
          <div class="card-action">→ Show panel</div>
        </div>
      `).join("");

      // Click handler: call show_panel tool via AI context
      listEl.querySelectorAll(".dashboard-card").forEach(card => {
        card.addEventListener("click", async () => {
          const uid = card.dataset.uid;
          const title = decodeURIComponent(card.dataset.title);
          if (app) {
            await app.updateModelContext({
              content: [{
                type: "text",
                text: `User selected dashboard: "${title}" (uid: ${uid}). Call show_panel to display it.`
              }]
            });
          }
        });
      });
    }

    // Search/filter
    document.getElementById("search-input").addEventListener("input", (e) => {
      const q = e.target.value.toLowerCase();
      const filtered = dashboards.filter(d =>
        d.title.toLowerCase().includes(q) ||
        (d.tags || []).some(t => t.toLowerCase().includes(q)) ||
        (d.folderTitle || "").toLowerCase().includes(q)
      );
      renderList(filtered);
    });

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
