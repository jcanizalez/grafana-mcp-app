<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grafana Panel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111217;
      color: #d9d9d9;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #181b1f;
      border-bottom: 1px solid #2c3235;
      flex-shrink: 0;
    }

    #dashboard-title {
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #panel-title {
      font-size: 12px;
      color: #9fa7b3;
    }

    .time-selector {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #22262b;
      border: 1px solid #2c3235;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 12px;
      color: #d9d9d9;
      cursor: pointer;
    }

    .time-selector select {
      background: transparent;
      border: none;
      color: #d9d9d9;
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }

    .time-selector select option {
      background: #22262b;
    }

    .btn {
      background: #22262b;
      border: 1px solid #2c3235;
      border-radius: 4px;
      color: #d9d9d9;
      cursor: pointer;
      font-size: 12px;
      padding: 4px 10px;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: background 0.15s;
    }

    .btn:hover { background: #2c3235; }

    .btn.primary {
      background: #3b6dc5;
      border-color: #3b6dc5;
      color: white;
    }
    .btn.primary:hover { background: #4a7dd5; }

    #grafana-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #6c757d;
    }

    .grafana-logo {
      width: 14px;
      height: 14px;
      opacity: 0.6;
    }

    #panel-frame {
      flex: 1;
      border: none;
      width: 100%;
      background: #111217;
    }

    #error-state {
      display: none;
      flex: 1;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      padding: 24px;
      text-align: center;
    }

    #error-state.visible { display: flex; }
    #error-icon { font-size: 32px; }
    #error-title { font-size: 15px; font-weight: 600; color: #e0e0e0; }
    #error-message { font-size: 13px; color: #9fa7b3; max-width: 400px; line-height: 1.5; }
    #error-url { font-size: 11px; color: #5c90de; word-break: break-all; max-width: 400px; }

    #loading-state {
      display: flex;
      flex: 1;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid #2c3235;
      border-top-color: #3b6dc5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-state p { font-size: 13px; color: #9fa7b3; }

    #status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      background: #181b1f;
      border-top: 1px solid #2c3235;
      font-size: 11px;
      color: #6c757d;
      flex-shrink: 0;
    }

    #status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #5e9e6e;
    }

    #status-dot.loading { background: #e0a55e; animation: pulse 1s ease-in-out infinite; }
    #status-dot.error { background: #d44646; animation: none; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>
  <div id="toolbar">
    <span id="dashboard-title">Dashboard</span>
    <span id="panel-title"></span>
    <div class="time-selector">
      <span>⏱</span>
      <select id="time-range">
        <option value="now-15m">Last 15 min</option>
        <option value="now-30m">Last 30 min</option>
        <option value="now-1h" selected>Last 1 hour</option>
        <option value="now-3h">Last 3 hours</option>
        <option value="now-6h">Last 6 hours</option>
        <option value="now-12h">Last 12 hours</option>
        <option value="now-24h">Last 24 hours</option>
        <option value="now-7d">Last 7 days</option>
      </select>
    </div>
    <button class="btn" id="refresh-btn" title="Refresh">⟳ Refresh</button>
    <button class="btn primary" id="context-btn" title="Update AI context">↑ Update AI</button>
    <div id="grafana-badge">
      <svg class="grafana-logo" viewBox="0 0 24 24" fill="#e0852a">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
      </svg>
      Grafana
    </div>
  </div>

  <div id="loading-state">
    <div class="spinner"></div>
    <p>Loading panel...</p>
  </div>

  <div id="error-state">
    <div id="error-icon">⚠️</div>
    <div id="error-title">Panel unavailable</div>
    <div id="error-message"></div>
    <div id="error-url"></div>
  </div>

  <iframe
    id="panel-frame"
    style="display:none"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
    loading="lazy"
  ></iframe>

  <div id="status-bar">
    <div id="status-dot" class="loading"></div>
    <span id="status-text">Connecting to Grafana...</span>
  </div>

  <script type="module">
    import { App } from "https://esm.sh/@modelcontextprotocol/ext-apps@1.1.2/app-with-deps";

    // State
    let state = {
      grafanaUrl: "",
      dashboardUid: "",
      dashboardTitle: "Dashboard",
      panelId: 0,
      panelTitle: "",
      timeRange: { from: "now-1h", to: "now" },
      theme: "dark",
    };

    const frame = document.getElementById("panel-frame");
    const loadingState = document.getElementById("loading-state");
    const errorState = document.getElementById("error-state");
    const statusDot = document.getElementById("status-dot");
    const statusText = document.getElementById("status-text");
    const dashboardTitleEl = document.getElementById("dashboard-title");
    const panelTitleEl = document.getElementById("panel-title");
    const timeRangeSelect = document.getElementById("time-range");

    // Connect to MCP host
    let app;
    try {
      app = new App();
      await app.connect();
      setStatus("loading", "Connected — loading panel...");
    } catch (e) {
      showError(
        "Could not connect to MCP host",
        "This view requires an MCP-compatible client (Claude, ChatGPT, VS Code, Goose). " +
        "If you're running the basic-host example, make sure it's started with `npm start`.",
        ""
      );
    }

    // Receive tool result from host
    if (app) {
      app.ontoolresult = (result) => {
        try {
          const data = typeof result.content === "string"
            ? JSON.parse(result.content)
            : result.content;

          if (data?.grafanaUrl) {
            state = { ...state, ...data };
            render();
          }
        } catch (e) {
          showError("Invalid panel data", String(e), "");
        }
      };
    }

    function buildEmbedUrl() {
      const params = new URLSearchParams({
        panelId: String(state.panelId),
        orgId: "1",
        from: state.timeRange.from,
        to: state.timeRange.to,
        theme: state.theme,
        refresh: "10s",
      });
      return `${state.grafanaUrl}/d-solo/${state.dashboardUid}/-?${params.toString()}`;
    }

    function render() {
      const url = buildEmbedUrl();

      dashboardTitleEl.textContent = state.dashboardTitle;
      panelTitleEl.textContent = state.panelTitle ? `› ${state.panelTitle}` : "";

      loadingState.style.display = "none";
      errorState.classList.remove("visible");

      frame.style.display = "block";
      frame.src = url;

      setStatus("ok", `Showing: ${state.dashboardTitle}${state.panelTitle ? " › " + state.panelTitle : ""}`);

      frame.onload = () => {
        setStatus("ok", `Live — ${state.timeRange.from} to ${state.timeRange.to}`);
      };

      frame.onerror = () => {
        showError(
          "Cannot embed this panel",
          "Grafana requires 'allow_embedding = true' in grafana.ini to allow iframe embeds. " +
          "With Docker Compose, set GF_SECURITY_ALLOW_EMBEDDING=true.",
          url
        );
      };
    }

    // Time range change
    timeRangeSelect.addEventListener("change", () => {
      state.timeRange = { from: timeRangeSelect.value, to: "now" };
      if (state.dashboardUid && state.panelId) {
        render();
        updateAIContext(`User changed time range to ${timeRangeSelect.options[timeRangeSelect.selectedIndex].text}`);
      }
    });

    // Refresh button
    document.getElementById("refresh-btn").addEventListener("click", () => {
      if (state.dashboardUid && state.panelId) {
        frame.src = frame.src; // Force reload
        setStatus("loading", "Refreshing...");
        setTimeout(() => setStatus("ok", "Refreshed"), 2000);
      }
    });

    // Update AI context button
    document.getElementById("context-btn").addEventListener("click", async () => {
      await updateAIContext(
        `User is viewing ${state.panelTitle || "panel"} from dashboard "${state.dashboardTitle}". ` +
        `Time range: ${state.timeRange.from} to ${state.timeRange.to}. ` +
        `Direct link: ${state.grafanaUrl}/d/${state.dashboardUid}/-`
      );
    });

    async function updateAIContext(message) {
      if (!app) return;
      try {
        await app.updateModelContext({
          content: [{ type: "text", text: message }],
        });
        setStatus("ok", "AI context updated");
        setTimeout(() => setStatus("ok", `Live — ${state.timeRange.from} to ${state.timeRange.to}`), 1500);
      } catch (e) {
        console.error("Failed to update AI context:", e);
      }
    }

    function setStatus(type, text) {
      statusDot.className = type === "ok" ? "" : type;
      statusText.textContent = text;
    }

    function showError(title, message, url) {
      loadingState.style.display = "none";
      frame.style.display = "none";
      errorState.classList.add("visible");
      document.getElementById("error-title").textContent = title;
      document.getElementById("error-message").textContent = message;
      document.getElementById("error-url").textContent = url;
      setStatus("error", "Error loading panel");
    }
  </script>
</body>
</html>
