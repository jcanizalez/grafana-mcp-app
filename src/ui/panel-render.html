<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111217;
      color: #d9d9d9;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #181b1f;
      border-bottom: 1px solid #2c3235;
      flex-shrink: 0;
    }

    #panel-title {
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .time-selector {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #22262b;
      border: 1px solid #2c3235;
      border-radius: 4px;
      padding: 4px 8px;
    }

    .time-selector select {
      background: transparent;
      border: none;
      color: #d9d9d9;
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }

    .time-selector select option { background: #22262b; }

    .btn {
      background: #22262b;
      border: 1px solid #2c3235;
      border-radius: 4px;
      color: #d9d9d9;
      cursor: pointer;
      font-size: 12px;
      padding: 4px 10px;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: background 0.15s;
    }

    .btn:hover { background: #2c3235; }
    .btn.primary { background: #f46800; border-color: #f46800; color: white; }
    .btn.primary:hover { background: #ff7a1a; }

    #chart-area {
      flex: 1;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    canvas { max-height: 100%; max-width: 100%; }

    /* Gauge / Stat layout */
    #gauge-container {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      height: 100%;
    }

    #gauge-value {
      font-size: 56px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1;
    }

    #gauge-unit {
      font-size: 18px;
      color: #9fa7b3;
    }

    #gauge-label {
      font-size: 13px;
      color: #9fa7b3;
      text-align: center;
    }

    #gauge-bar-wrap {
      width: 80%;
      max-width: 300px;
      height: 8px;
      background: #2c3235;
      border-radius: 4px;
      overflow: hidden;
    }

    #gauge-bar {
      height: 100%;
      border-radius: 4px;
      background: #5e9e6e;
      transition: width 0.4s;
    }

    #loading-state {
      display: flex;
      flex: 1;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #2c3235;
      border-top-color: #f46800;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-state p { font-size: 13px; color: #9fa7b3; }

    #error-state {
      display: none;
      flex: 1;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      padding: 24px;
      text-align: center;
    }

    #error-state.visible { display: flex; }
    #error-icon { font-size: 28px; }
    #error-title { font-size: 15px; font-weight: 600; color: #e0e0e0; }
    #error-message { font-size: 13px; color: #9fa7b3; max-width: 400px; line-height: 1.5; }

    #status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      background: #181b1f;
      border-top: 1px solid #2c3235;
      font-size: 11px;
      color: #6c757d;
      flex-shrink: 0;
    }

    #status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #5e9e6e;
    }

    #status-dot.loading { background: #e0a55e; animation: pulse 1s ease-in-out infinite; }
    #status-dot.error { background: #d44646; animation: none; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    #expr-display {
      font-size: 10px;
      color: #6c757d;
      font-family: 'Courier New', monospace;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <span id="panel-title">Panel</span>
    <div class="time-selector">
      <select id="time-range">
        <option value="now-15m">Last 15 min</option>
        <option value="now-30m">Last 30 min</option>
        <option value="now-1h" selected>Last 1 hour</option>
        <option value="now-3h">Last 3 hours</option>
        <option value="now-6h">Last 6 hours</option>
        <option value="now-12h">Last 12 hours</option>
        <option value="now-24h">Last 24 hours</option>
      </select>
    </div>
    <button class="btn" id="refresh-btn">&#x21BB; Refresh</button>
    <button class="btn primary" id="context-btn">&#x2191; Update AI</button>
  </div>

  <div id="chart-area" style="display:none">
    <canvas id="main-chart"></canvas>
    <div id="gauge-container">
      <div id="gauge-value">--</div>
      <div id="gauge-unit"></div>
      <div id="gauge-bar-wrap"><div id="gauge-bar" style="width:0%"></div></div>
      <div id="gauge-label"></div>
    </div>
  </div>

  <div id="loading-state">
    <div class="spinner"></div>
    <p>Connecting to MCP host...</p>
  </div>

  <div id="error-state">
    <div id="error-icon">&#x26A0;&#xFE0F;</div>
    <div id="error-title">Cannot render panel</div>
    <div id="error-message"></div>
  </div>

  <div id="status-bar">
    <div id="status-dot" class="loading"></div>
    <span id="status-text">Waiting for data...</span>
    <span id="expr-display"></span>
  </div>

  <script type="module">
    import { App } from "https://esm.sh/@modelcontextprotocol/ext-apps@1.1.2/app-with-deps";

    let chartInstance = null;
    let state = null;
    let app = null;

    const loadingState = document.getElementById("loading-state");
    const errorState = document.getElementById("error-state");
    const chartArea = document.getElementById("chart-area");
    const statusDot = document.getElementById("status-dot");
    const statusText = document.getElementById("status-text");
    const exprDisplay = document.getElementById("expr-display");

    // Color palette for multiple series
    const COLORS = [
      "#f46800", "#5e9e6e", "#3b6dc5", "#e0a55e",
      "#9b59b6", "#1abc9c", "#e74c3c", "#3498db",
      "#2ecc71", "#f39c12",
    ];

    // Connect to MCP host
    try {
      app = new App();
      await app.connect();
      setStatus("loading", "Connected — waiting for panel data...");
    } catch (e) {
      showError(
        "Cannot connect to MCP host",
        "This view requires an MCP-compatible AI client (Claude Desktop, VS Code, Goose). " +
        "Run render_panel() from your AI chat to see data here."
      );
    }

    if (app) {
      app.ontoolresult = (result) => {
        try {
          const raw = typeof result.content === "string"
            ? result.content
            : JSON.stringify(result.content);

          const data = JSON.parse(raw);

          if (data?.__renderPanel) {
            state = data;
            render(data);
          }
        } catch (e) {
          showError("Invalid panel data", String(e));
        }
      };
    }

    function formatValue(val, unit) {
      if (val === null || val === undefined || isNaN(val)) return "--";
      if (unit === "percent" || unit === "percent_0_100") return val.toFixed(1) + "%";
      if (unit === "percentunit") return (val * 100).toFixed(1) + "%";
      if (unit === "bytes") {
        if (val > 1e9) return (val / 1e9).toFixed(1) + " GB";
        if (val > 1e6) return (val / 1e6).toFixed(1) + " MB";
        if (val > 1e3) return (val / 1e3).toFixed(1) + " KB";
        return val.toFixed(0) + " B";
      }
      if (unit === "ms") return val.toFixed(0) + " ms";
      if (unit === "s") return val.toFixed(2) + " s";
      if (unit === "reqps") return val.toFixed(2) + " req/s";
      if (Math.abs(val) >= 1e6) return (val / 1e6).toFixed(2) + "M";
      if (Math.abs(val) >= 1e3) return (val / 1e3).toFixed(2) + "K";
      return val.toFixed(2);
    }

    function getThresholdColor(val, thresholds) {
      if (!thresholds || thresholds.length === 0) return "#5e9e6e";
      const sorted = [...thresholds].filter(t => t.value !== null).sort((a, b) => a.value - b.value);
      let color = "#5e9e6e"; // default green
      for (const t of sorted) {
        if (val >= t.value) color = t.color === "red" ? "#d44646" : t.color === "orange" ? "#f46800" : t.color;
      }
      return color;
    }

    function render(data) {
      loadingState.style.display = "none";
      errorState.classList.remove("visible");
      chartArea.style.display = "flex";

      document.getElementById("panel-title").textContent = data.title;
      exprDisplay.textContent = data.expr;

      const panelType = data.type ?? "timeseries";

      if (panelType === "gauge" || panelType === "stat") {
        renderGauge(data);
      } else if (panelType === "bargauge") {
        renderBargauge(data);
      } else {
        renderTimeseries(data);
      }

      const points = data.dataPoints ?? 0;
      const rangeLabel = data.from + " to " + data.to;
      setStatus("ok", `${data.series.length} series, ${points} data points | ${rangeLabel}`);
    }

    function renderTimeseries(data) {
      document.getElementById("main-chart").style.display = "block";
      document.getElementById("gauge-container").style.display = "none";

      if (chartInstance) {
        chartInstance.destroy();
        chartInstance = null;
      }

      const datasets = data.series.map((s, i) => {
        const pts = s.points.map(([t, v]) => ({ x: t * 1000, y: v }));
        return {
          label: s.name,
          data: pts,
          borderColor: COLORS[i % COLORS.length],
          backgroundColor: COLORS[i % COLORS.length] + "22",
          borderWidth: 2,
          pointRadius: 0,
          tension: 0.1,
          fill: data.series.length === 1,
        };
      });

      const ctx = document.getElementById("main-chart").getContext("2d");
      chartInstance = new Chart(ctx, {
        type: "line",
        data: { datasets },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          animation: { duration: 300 },
          scales: {
            x: {
              type: "time",
              time: { tooltipFormat: "HH:mm:ss", displayFormats: { minute: "HH:mm", hour: "HH:mm" } },
              grid: { color: "#2c3235" },
              ticks: { color: "#9fa7b3", maxTicksLimit: 8, font: { size: 11 } },
            },
            y: {
              grid: { color: "#2c3235" },
              ticks: {
                color: "#9fa7b3",
                font: { size: 11 },
                callback: (v) => formatValue(v, data.unit),
              },
            },
          },
          plugins: {
            legend: {
              display: data.series.length > 1,
              labels: { color: "#9fa7b3", font: { size: 11 }, boxWidth: 12 },
            },
            tooltip: {
              backgroundColor: "#1e2128",
              titleColor: "#d9d9d9",
              bodyColor: "#9fa7b3",
              borderColor: "#2c3235",
              borderWidth: 1,
              callbacks: {
                label: (ctx) => ` ${ctx.dataset.label}: ${formatValue(ctx.parsed.y, data.unit)}`,
              },
            },
          },
        },
      });
    }

    function renderGauge(data) {
      document.getElementById("main-chart").style.display = "none";
      const gauge = document.getElementById("gauge-container");
      gauge.style.display = "flex";

      if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

      // Get last value from first series
      const series = data.series[0];
      if (!series || series.points.length === 0) {
        document.getElementById("gauge-value").textContent = "No data";
        return;
      }

      const lastPoint = series.points[series.points.length - 1];
      const val = lastPoint[1];
      const min = data.min ?? 0;
      const max = data.max ?? (data.unit?.includes("percent") ? 100 : val * 2);
      const pct = Math.min(100, Math.max(0, ((val - min) / (max - min)) * 100));

      const color = getThresholdColor(val, data.thresholds);
      document.getElementById("gauge-value").textContent = formatValue(val, data.unit);
      document.getElementById("gauge-value").style.color = color;
      document.getElementById("gauge-unit").textContent = "";
      document.getElementById("gauge-label").textContent = series.name !== data.title ? series.name : "";
      document.getElementById("gauge-bar").style.width = pct + "%";
      document.getElementById("gauge-bar").style.background = color;
    }

    function renderBargauge(data) {
      document.getElementById("main-chart").style.display = "block";
      document.getElementById("gauge-container").style.display = "none";

      if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

      // Get last value from each series
      const labels = data.series.map(s => s.name);
      const values = data.series.map(s => {
        const pts = s.points;
        return pts.length > 0 ? pts[pts.length - 1][1] : 0;
      });
      const colors = values.map((v, i) => COLORS[i % COLORS.length]);

      const ctx = document.getElementById("main-chart").getContext("2d");
      chartInstance = new Chart(ctx, {
        type: "bar",
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: colors,
            borderColor: colors,
            borderWidth: 1,
            borderRadius: 4,
          }],
        },
        options: {
          indexAxis: "y",
          responsive: true,
          maintainAspectRatio: true,
          animation: { duration: 300 },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: { label: (ctx) => formatValue(ctx.parsed.x, data.unit) },
            },
          },
          scales: {
            x: {
              grid: { color: "#2c3235" },
              ticks: { color: "#9fa7b3", callback: (v) => formatValue(v, data.unit) },
            },
            y: {
              grid: { display: false },
              ticks: { color: "#9fa7b3", font: { size: 11 } },
            },
          },
        },
      });
    }

    // Time range change — refetch by calling render_panel again via AI context
    document.getElementById("time-range").addEventListener("change", async (e) => {
      if (!state || !app) return;
      const from = e.target.value;
      await updateAIContext(
        `User changed time range to ${e.target.options[e.target.selectedIndex].text}. ` +
        `Please call render_panel again with from="${from}" to update the chart.`
      );
    });

    // Refresh
    document.getElementById("refresh-btn").addEventListener("click", async () => {
      if (!state || !app) return;
      await updateAIContext(
        `User requested refresh. Please call render_panel(expr="${state.expr}", type="${state.type}", ` +
        `title="${state.title}", unit="${state.unit}", from="${state.from}", to="${state.to}") again.`
      );
      setStatus("loading", "Refreshing...");
    });

    // Update AI context
    document.getElementById("context-btn").addEventListener("click", async () => {
      if (!state) return;
      const series = state.series ?? [];
      const latestValues = series.slice(0, 3).map(s => {
        const last = s.points[s.points.length - 1];
        return last ? `${s.name}: ${formatValue(last[1], state.unit)}` : null;
      }).filter(Boolean).join(", ");

      await updateAIContext(
        `Panel "${state.title}": ${latestValues || "no data"}. ` +
        `Expression: ${state.expr}. Range: ${state.from} to ${state.to}.`
      );
    });

    async function updateAIContext(message) {
      if (!app) return;
      try {
        await app.updateModelContext({ content: [{ type: "text", text: message }] });
        setStatus("ok", "AI context updated");
        setTimeout(() => {
          const pts = (state?.dataPoints) ?? 0;
          setStatus("ok", `${(state?.series?.length ?? 0)} series, ${pts} data points`);
        }, 1500);
      } catch (e) {
        console.error("Failed to update AI context:", e);
      }
    }

    function setStatus(type, text) {
      statusDot.className = type === "ok" ? "" : type;
      statusText.textContent = text;
    }

    function showError(title, message) {
      loadingState.style.display = "none";
      chartArea.style.display = "none";
      errorState.classList.add("visible");
      document.getElementById("error-title").textContent = title;
      document.getElementById("error-message").textContent = message;
      setStatus("error", "Error");
    }
  </script>
</body>
</html>
